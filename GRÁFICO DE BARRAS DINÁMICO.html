<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gráfico de Barras Dinámico</title>

<style>
#contenedor {
    display: flex;
    align-items: flex-end;
    height: 300px;
    width: 400px;
    border: 2px solid black;
    gap: 10px;
    padding: 10px;
}

.barra {
    width: 50px;
    text-align: center;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Gráfico de Barras Dinámico</h2>

<div id="contenedor"></div>

<script>
const contenedor = document.getElementById("contenedor");

// 🎨 lista de colores
const colores = ["red", "blue", "green", "orange", "purple"];

// crear 5 barras
for (let i = 0; i < 5; i++) {
    let barra = document.createElement("div");
    barra.classList.add("barra");
    contenedor.appendChild(barra);
}

function actualizar() {
    let barras = document.querySelectorAll(".barra");

    barras.forEach((barra, i) => {
        let valor = Math.floor(Math.random() * 90) + 10;

        barra.style.height = valor * 2 + "px";
        barra.style.backgroundColor = colores[i]; // 🎨 color diferente
        barra.textContent = valor;
    });
}

// actualizar cada segundo
setInterval(actualizar, 1000);
</script>

</body>
</html>
