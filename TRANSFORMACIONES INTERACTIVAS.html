<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transformaciones 3D</title>
<style>
body{
    margin:0;
    overflow:hidden;
    font-family: Arial;
}

/* Panel lateral */
#panel{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:15px;
    border-radius:10px;
    width:200px;
    line-height:1.6;
}
</style>
</head>
<body>

<div id="panel">
    <b>CONTROLES</b><br><br>
    ⬆⬇⬅➡ : Mover<br>
    Q / E : Rotar<br>
    W : Aumentar tamaño<br>
    S : Disminuir tamaño
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Cubo
const cube = new THREE.Mesh(
    new THREE.BoxGeometry(),
    new THREE.MeshNormalMaterial()
);
scene.add(cube);

// Controles
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function animate(){
    requestAnimationFrame(animate);

    // 🔹 TRASLACIÓN
    if(keys["ArrowUp"]) cube.position.y += 0.05;
    if(keys["ArrowDown"]) cube.position.y -= 0.05;
    if(keys["ArrowLeft"]) cube.position.x -= 0.05;
    if(keys["ArrowRight"]) cube.position.x += 0.05;

    // 🔹 ROTACIÓN
    if(keys["q"]) cube.rotation.y -= 0.05;
    if(keys["e"]) cube.rotation.y += 0.05;

    // 🔹 ESCALA (SIN DISTORSIÓN)
    if(keys["w"]) cube.scale.multiplyScalar(1.01);
    if(keys["s"]) cube.scale.multiplyScalar(0.99);

    // 🔹 LÍMITES para evitar deformación/desaparición
    cube.scale.x = Math.max(0.5, Math.min(3, cube.scale.x));
    cube.scale.y = cube.scale.x;
    cube.scale.z = cube.scale.x;

    renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
