<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transformaciones 3D</title>
<style>body{margin:0;overflow:hidden;}</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Cubo
const cube = new THREE.Mesh(
    new THREE.BoxGeometry(),
    new THREE.MeshNormalMaterial()
);
scene.add(cube);

// Controles
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function animate(){
    requestAnimationFrame(animate);

    // 🔹 TRASLACIÓN
    if(keys["ArrowUp"]) cube.position.y += 0.05;
    if(keys["ArrowDown"]) cube.position.y -= 0.05;
    if(keys["ArrowLeft"]) cube.position.x -= 0.05;
    if(keys["ArrowRight"]) cube.position.x += 0.05;

    // 🔹 ROTACIÓN
    if(keys["q"]) cube.rotation.y -= 0.05;
    if(keys["e"]) cube.rotation.y += 0.05;

    // 🔹 ESCALA
    if(keys["w"]) cube.scale.x += 0.01, cube.scale.y += 0.01, cube.scale.z += 0.01;
    if(keys["s"]) cube.scale.x -= 0.01, cube.scale.y -= 0.01, cube.scale.z -= 0.01;

    renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
