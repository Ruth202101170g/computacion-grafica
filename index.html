<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Computación Gráfica</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;

    background: linear-gradient(270deg, #ff4ecd, #ff7eb3, #ff4ecd);
    background-size: 600% 600%;
    animation: fondoAnimado 10s ease infinite;
}

@keyframes fondoAnimado {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1 {
    margin: 30px 0;
}

/* 🔥 SECCIONES */
.seccion {
    background: rgba(255,255,255,0.15);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

.seccion h2 {
    margin-bottom: 20px;
}

/* CONTENEDOR */
.contenedor {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* TARJETAS */
.card {
    background: rgba(255,255,255,0.9);
    color: black;
    width: 250px;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}

/* BOTÓN */
.boton {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background-color: #ff4ecd;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

.boton:hover {
    background-color: #e60073;
}

/* EFECTO LUZ */
.cursor-luz {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<h1>Mis Figuras - Computación Gráfica</h1>

<!-- 🔵 ACTIVIDAD EN CLASE -->
<div class="seccion">
    <h2>Actividad en Clase</h2>
    <div class="contenedor">

        <div class="card">
            <h3>Cuadrado y Triángulo</h3>
            <a href="figura_circular.html" class="boton">Ver</a>
        </div>

        <div class="card">
            <h3>Funciones X Y</h3>
            <a href="funciones_de_x_y_y.html" class="boton">Ver</a>
        </div>

        <div class="card">
            <h3>Gráfico de Barras</h3>
            <a href="GRAFICOBARAS.HTML" class="boton">Ver</a>
        </div>

        <div class="card">
            <h3>Función Matemática</h3>
            <a href="graficar_una_funcion_matematica.html" class="boton">Ver</a>
        </div>

    </div>
</div>

<!-- 🟣 ACTIVIDAD 4 -->
<div class="seccion">
    <h2>Actividad 4</h2>
    <div class="contenedor">

        <div class="card">
            <h3>Barras Dinámicas</h3>
            <a href="GRÁFICO DE BARRAS DINÁMICO.html" class="boton">Ver</a>
        </div>

        <div class="card">
            <h3>Puntos en Movimiento</h3>
            <a href="Gráfico de Puntos en Movimiento.html" class="boton">Ver</a>
        </div>

        <div class="card">
            <h3>Curva cos(x)</h3>
            <a href="Curva Dinámica de la Función Cosen.html" class="boton">Ver</a>
        </div>

    </div>
</div>

<!-- 🔴 ACTIVIDAD 5 -->
<div class="seccion">
    <h2>Actividad 5</h2>
    <div class="contenedor">

        <div class="card">
            <h3>Traslación</h3>
            <a href="traslacion movimiento x.html" class="boton">Ver</a>
        </div>

        <div class="card">
            <h3>Rotación</h3>
            <a href="rotacion.html" class="boton">Ver</a>
        </div>

        <div class="card">
            <h3>Transformaciones</h3>
            <a href="TRANSFORMACIONES INTERACTIVAS.html" class="boton">Ver</a>
        </div>

    </div>
</div>

<!-- EFECTO LUZ -->
<div class="cursor-luz" id="luz"></div>

<script>
const luz = document.getElementById("luz");

document.addEventListener("mousemove", (e) => {
    luz.style.left = e.clientX + "px";
    luz.style.top = e.clientY + "px";
});
</script>

</body>
</html>
